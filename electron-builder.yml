appId: dev.charlesjones.dfsyncer
productName: df-syncer-windows
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/**/{test,tests,__tests__}/**"
  - "!node_modules/**/*.map"
asar: true
win:
  target:
    - target: portable
      arch: [x64]
    - target: nsis
      arch: [x64]
    - target: msi
      arch: [x64]
  icon: resources/icon.ico
portable:
  artifactName: "df-syncer-windows-${version}.exe"
nsis:
  oneClick: true
  artifactName: "df-syncer-windows-${version}-setup.exe"
msi:
  artifactName: "df-syncer-windows-${version}.msi"
